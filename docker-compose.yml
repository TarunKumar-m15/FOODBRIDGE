version: '3.8'

services:
  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    restart: always
    depends_on:
      - ml-service

  client:
    build:
      context: ./client
    ports:
      - "80:80"
    restart: always
    depends_on:
      - server

  ml-service:
    build:
      context: ./ml-service
    ports:
      - "8000:8000"
    restart: always
